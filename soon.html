<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APEX — Coming soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />
<style>
  body { background: linear-gradient(135deg, #fff1f0 0%, #ffffff 50%, #fff7ed 100%); min-height: 100vh; }
  .soon-frame { max-width: 640px; margin: 0 auto; padding: 60px 20px; }
  .icon-orbit {
    position: relative; width: 200px; height: 200px; margin: 0 auto 32px;
  }
  .orbit-core {
    position: absolute; inset: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--racing) 0%, var(--ember) 100%);
    display: flex; align-items: center; justify-content: center; color: white;
    box-shadow: 0 30px 60px -20px rgba(239,43,29,0.5);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 30px 60px -20px rgba(239,43,29,0.5); }
    50%      { transform: scale(1.05); box-shadow: 0 40px 80px -16px rgba(249,115,22,0.55); }
  }
  .orbit-ring {
    position: absolute; inset: 0; border: 2px dashed #fecaca; border-radius: 50%;
    animation: spin-slow 18s linear infinite;
  }
  .orbit-ring-2 {
    position: absolute; inset: 12px; border: 2px dashed #fed7aa; border-radius: 50%;
    animation: spin-slow 14s linear infinite reverse;
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  .orbit-dot {
    position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px; border-radius: 50%; background: var(--racing);
    box-shadow: 0 0 12px rgba(239,43,29,0.8);
  }

  .feature-name { font-family: 'Space Grotesk'; font-size: 36px; font-weight: 800; margin: 0 0 14px; text-align: center; letter-spacing: -0.025em; }
  .feature-desc { font-size: 17px; color: var(--ink-700); text-align: center; line-height: 1.55; margin: 0 0 32px; }
  .notify-form { display: flex; gap: 8px; max-width: 460px; margin: 0 auto; }
  .notify-form input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--stone-200); font-size: 15px; font-family: inherit; }
  .notify-form input:focus { outline: none; border-color: var(--racing); box-shadow: 0 0 0 3px rgba(239,43,29,0.1); }
  .links { display: flex; justify-content: center; gap: 14px; margin-top: 24px; font-size: 14px; }
  .links a { color: var(--ink-500); }
  .links a:hover { color: var(--racing); }
  .preview-box { margin-top: 36px; }
  .timeline { display: flex; gap: 14px; align-items: center; padding: 16px; background: white; border: 1px dashed var(--stone-300); border-radius: 14px; }
  .timeline-step { flex: 1; text-align: center; padding: 10px; }
  .timeline-step .label { font-size: 11px; font-weight: 700; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .timeline-step .value { font-family: 'Space Grotesk'; font-weight: 700; font-size: 14px; }
  .timeline-step.now { color: var(--racing); }
  .timeline-step.now .value { color: var(--racing); }
  .timeline-step.next .value { color: var(--ember); }
  .timeline-arrow { color: var(--stone-300); }
</style>
</head>
<body>
  <div class="soon-frame fade-in">
    <a href="javascript:history.back()" class="btn btn-ghost" style="margin-bottom: 12px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>

    <div class="icon-orbit">
      <div class="orbit-ring"><div class="orbit-dot"></div></div>
      <div class="orbit-ring-2"><div class="orbit-dot" style="background: var(--ember); box-shadow: 0 0 12px rgba(249,115,22,0.8);"></div></div>
      <div class="orbit-core">
        <svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
    </div>

    <p style="text-align: center; font-size: 12px; font-weight: 700; color: var(--racing); letter-spacing: 0.18em; text-transform: uppercase; margin: 0 0 8px;">In development</p>
    <h1 class="feature-name" id="featureName">This feature</h1>
    <p class="feature-desc" id="featureDesc">Lots of good stuff cooking. Drop your email and we'll ping you when it ships.</p>

    <div class="preview-box">
      <div class="timeline">
        <div class="timeline-step done">
          <div class="label">Designed</div>
          <div class="value" style="color: #16a34a;">Done</div>
        </div>
        <span class="timeline-arrow">→</span>
        <div class="timeline-step now">
          <div class="label">Building</div>
          <div class="value">In progress</div>
        </div>
        <span class="timeline-arrow">→</span>
        <div class="timeline-step next">
          <div class="label">Ships</div>
          <div class="value">Soon</div>
        </div>
      </div>
    </div>

    <form class="notify-form" style="margin-top: 32px;" onsubmit="notify(event)">
      <input type="email" placeholder="you@example.com" required />
      <button type="submit" class="btn btn-primary">Notify me</button>
    </form>
    <p id="thanks" style="display:none; text-align:center; color: var(--racing); font-weight: 600; margin-top: 14px;">You're on the list. We'll email you when it ships.</p>

    <div class="links">
      <a href="dashboard.html">Teen dashboard</a>
      <span style="color: var(--stone-300);">·</span>
      <a href="parent.html">Parent dashboard</a>
      <span style="color: var(--stone-300);">·</span>
      <a href="index.html">Landing</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const f = params.get('f');
    const d = params.get('d');
    if (f) document.getElementById('featureName').textContent = f;
    if (d) document.getElementById('featureDesc').textContent = d;
    document.title = 'APEX — ' + (f || 'Coming soon');

    function notify(e) {
      e.preventDefault();
      e.target.style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    }
  </script>
</body>
</html>
